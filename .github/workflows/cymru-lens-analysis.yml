name: CognioCymru Lens Analysis

on:
  # Run every 20 minutes — clears backlog then maintains pace with ingestion
  schedule:
    - cron: '*/20 * * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of stories to process'
        required: false
        default: '20'

jobs:
  lens-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Run lens analysis on VPS2
        env:
          VPS_HOST: ${{ secrets.VPS2_HOST }}
          VPS_USER: ${{ secrets.VPS2_USER }}
          VPS_KEY: ${{ secrets.VPS2_SSH_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
        run: |
          BATCH_SIZE="${{ github.event.inputs.batch_size || '20' }}"

          # Install SSH client
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

          # Build env export string for all available API keys
          ENV_EXPORTS=""
          [ -n "$GROQ_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export GROQ_API_KEY='$GROQ_API_KEY';"
          [ -n "$CEREBRAS_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export CEREBRAS_API_KEY='$CEREBRAS_API_KEY';"
          [ -n "$MISTRAL_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export MISTRAL_API_KEY='$MISTRAL_API_KEY';"
          [ -n "$SAMBANOVA_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export SAMBANOVA_API_KEY='$SAMBANOVA_API_KEY';"
          [ -n "$NVIDIA_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export NVIDIA_API_KEY='$NVIDIA_API_KEY';"
          [ -n "$DEEPSEEK_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export DEEPSEEK_API_KEY='$DEEPSEEK_API_KEY';"
          [ -n "$GOOGLE_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export GOOGLE_API_KEY='$GOOGLE_API_KEY';"
          [ -n "$COHERE_API_KEY" ] && ENV_EXPORTS="$ENV_EXPORTS export COHERE_API_KEY='$COHERE_API_KEY';"
          [ -n "$GITHUB_MODELS_TOKEN" ] && ENV_EXPORTS="$ENV_EXPORTS export GITHUB_TOKEN='$GITHUB_MODELS_TOKEN';"

          # SSH into VPS2 and run the lens analysis
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key "$VPS_USER@$VPS_HOST" << REMOTE
            $ENV_EXPORTS
            cd /opt/cognio-cymru
            npx tsx scripts/lens-analysis.ts $BATCH_SIZE
          REMOTE

      - name: Summary
        if: always()
        run: echo "Lens analysis run complete. Check VPS2 logs for details."
